<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c3e50;
            --accent-color: #2980b9;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            margin: 60px 20px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
        }
        h1 { font-size: 2rem; margin-top: 0; }
        h2 { font-size: 1.3rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.4rem; margin-top: 2rem; }
        ul { padding-left: 20px; }
        li { margin-bottom: 0.8rem; }
        a { color: var(--accent-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .date { font-size: 0.85rem; color: #95a5a6; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Blog</h1>
        <p>日々の記録やメモを残す場所です。</p>

        <h2>記事一覧</h2>
        <ul id="article-list">
            <li>読み込み中...</li>
        </ul>
    </div>

    <script>
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const listContainer = document.getElementById('article-list');
                listContainer.innerHTML = '';
                if (posts.length === 0) {
                    listContainer.innerHTML = '<li>まだ記事がありません。</li>';
                    return;
                }
                posts.forEach(post => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span class="date">${post.date}</span>
                        <a href="post.html?p=${post.id}">${post.title}</a>
                    `;
                    listContainer.appendChild(li);
                });
            })
            .catch(error => {
                document.getElementById('article-list').innerHTML = '<li>記事一覧の読み込みに失敗しました。</li>';
            });
    </script>
</body>
</html>
