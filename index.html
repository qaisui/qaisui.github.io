<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYCT</title>
    <!-- Markdownを綺麗に変換してくれるライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c3e50;
            --accent-color: #2980b9;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            margin: 60px 20px;
        }
        h1 { font-size: 2rem; margin-top: 0; }
        .site-desc { color: #7f8c8d; margin-bottom: 2rem; }
        
        /* 記事ごとのカード（縦に積み重なる） */
        .entry {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        .entry-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .date { font-size: 0.85rem; color: #95a5a6; margin-bottom: 5px; }
        .entry-title { font-size: 1.4rem; margin: 0; color: var(--text-color); }
        
        .entry-body p { 
            margin: 0 0 1rem 0; 
            font-size: 9px;
        }
        .entry-body ul { padding-left: 20px; margin: 0 0 1rem 0; }
        .entry-body li { margin-bottom: 0.3rem; }
        
        pre { background: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border-color); }
        code { background: #f1f2f6; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre code { background: none; padding: 0; }

        @media (max-width: 600px) {
            .container { margin: 20px 10px; }
            .entry { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Diary</h1>
        <p class="site-desc">日記</p>

        <!-- すべての日記がここに縦に自動で並びます -->
        <div id="entries-container">読み込み中...</div>
    </div>

    <script>
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const container = document.getElementById('entries-container');
                container.innerHTML = '';
                
                if (posts.length === 0) {
                    container.innerHTML = '<p>まだ記事がありません。</p>';
                    return;
                }

                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'entry';
                    div.innerHTML = `
                        <div class="entry-header">
                            <div class="date">${post.date}</div>
                            <h2 class="entry-title">${post.title}</h2>
                        </div>
                        <div class="entry-body">${marked.parse(post.body)}</div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById('entries-container').innerHTML = '<p>読み込みに失敗しました。</p>';
            });
    </script>
</body>
</html>
