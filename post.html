<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ記事</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c3e50;
            --accent-color: #2980b9;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            margin: 60px 20px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #7f8c8d;
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }
        h1, h2, h3 { color: var(--text-color); }
        h2 { border-left: 3px solid var(--accent-color); padding-left: 10px; margin-top: 2.5rem; }
        a { color: var(--accent-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border-color); }
        code { background: #f1f2f6; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        pre code { background: none; padding: 0; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; トップページに戻る</a>
        <div id="content">読み込み中...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('p');

        if (!postId) {
            document.getElementById('content').innerHTML = '<p>記事が指定されていません。</p>';
        } else {
            fetch(`posts/${postId}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('記事が見つかりませんでした');
                    return response.text();
                })
                .then(markdown => {
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `<p>${error.message}</p>`;
                });
        }
    </script>
</body>
</html>
